<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PNK Inmobiliaria</title>
    <style>
        /* Estilos inspirados en portales inmobiliarios modernos */
        :root {
            --primary-color: #2b3647; /* Azul oscuro corporativo */
            --secondary-color: #00a650; /* Verde estilo MercadoLibre/Portal Inmobiliario */
            --bg-color: #ebebeb;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header / Navbar */
        header {
            background-color: #ffe600; /* Toque amarillo clásico de portales de Latam */
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-container h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .admin-indicator {
            background-color: #0056b3;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .admin-indicator:hover {
            background-color: #004085;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.95rem;
        }

        nav a:hover {
            color: #000;
        }

        /* Main Content - Centrado con Flexbox */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--secondary-color);
        }

        .btn-login {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .btn-login:hover {
            background-color: #008f45;
        }

        .error-message {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background-color: var(--primary-color);
            color: #fff;
            padding: 20px 5%;
            text-align: center;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; color: inherit;"><h1>PNK Inmobiliaria</h1></a>
            </div>
            <div class="admin-indicator">
                <a href="admin-login.html" style="color: white; text-decoration: none;">¿Eres Administrador?</a>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login-container" aria-labelledby="login-title">
            <h2 id="login-title">Iniciar Sesión</h2>
            <div id="error-message" class="error-message">
                Usuario o contraseña incorrectos.
            </div>
            <form id="login-form" action="#" method="post" aria-labelledby="login-title">
                <div class="form-group">
                    <label for="usuario">Usuario (Nombre, Email o RUT)</label>
                    <input type="text" id="usuario" name="usuario" required aria-label="Ingrese su nombre, email o RUT" placeholder="Ej: Juan Pérez, juan@email.com o 12.345.678-9">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required aria-label="Ingrese su contraseña" placeholder="Contraseña">
                </div>

                <button type="submit" class="btn-login" aria-label="Iniciar sesión en su cuenta">Ingresar</button>

                <div class="forgot-password">
                    <a href="recuperar.html" aria-label="Ir a la página de recuperación de contraseña">Recuperar Contraseña</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 PNK Inmobiliaria - La Serena, Región de Coquimbo</p>
    </footer>

    <script>
        function formatRut(value) {
            const raw = value.toLowerCase().replace(/[^0-9k]/g, '');
            if (!/^[0-9]+[0-9k]$/.test(raw)) {
                return value;
            }
            const cuerpo = raw.slice(0, -1);
            const dv = raw.slice(-1);
            let formatted = '';
            for (let i = cuerpo.length - 1, contador = 0; i >= 0; i--, contador++) {
                formatted = cuerpo[i] + formatted;
                if ((contador + 1) % 3 === 0 && i !== 0) {
                    formatted = '.' + formatted;
                }
            }
            return formatted + '-' + dv;
        }

        function normalizeRut(value) {
            return value.toLowerCase().replace(/[^0-9k]/g, '');
        }

        document.getElementById('usuario').addEventListener('blur', function() {
            this.value = formatRut(this.value);
        });

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            // Obtener usuarios registrados
            const usuariosRegistradosStr = localStorage.getItem('usuariosRegistrados') || localStorage.getItem('usuarioRegistrado');
            
            if (usuariosRegistradosStr) {
                try {
                    const usuariosRegistrados = JSON.parse(usuariosRegistradosStr);
                    const usuarios = Array.isArray(usuariosRegistrados) ? usuariosRegistrados : [usuariosRegistrados];
                    
                    const usuarioInputLower = usuario.toLowerCase().trim();
                    const usuarioInputRut = normalizeRut(usuario);
                    const usuarioEncontrado = usuarios.find(u => {
                        const nombre = u.nombre.toLowerCase();
                        const email = u.email.toLowerCase();
                        const rut = normalizeRut(u.rut);
                        return (
                            usuarioInputLower === nombre ||
                            usuarioInputLower === email ||
                            usuarioInputRut === rut ||
                            nombre.includes(usuarioInputLower)
                        );
                    });
                    
                    if (usuarioEncontrado && password === usuarioEncontrado.password) {
                        if (usuarioEncontrado.status && usuarioEncontrado.status !== 'activo') {
                            errorMessage.textContent = 'Tu cuenta está pendiente de activación por el administrador.';
                            errorMessage.style.display = 'block';
                            return;
                        }
                        // Login exitoso - guardar sesión y redirigir al dashboard
                        sessionStorage.setItem('usuarioLogueado', JSON.stringify(usuarioEncontrado));
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch (error) {
                    console.error('Error al parsear datos del usuario:', error);
                }
            }
            
            // Login fallido - mostrar error
            errorMessage.style.display = 'block';
        });
    </script>

</body>
</html>
