<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Propietario - PNK Inmobiliaria</title>
    <style>
        /* Estilos inspirados en portales inmobiliarios modernos */
        :root {
            --primary-color: #2b3647; /* Azul oscuro corporativo */
            --secondary-color: #00a650; /* Verde estilo MercadoLibre/Portal Inmobiliario */
            --bg-color: #ebebeb;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Header / Navbar */
        header {
            background-color: #ffe600; /* Toque amarillo clásico de portales de Latam */
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-container h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.95rem;
        }

        nav a:hover {
            color: #000;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-outline {
            border: 1px solid var(--primary-color);
            padding: 8px 15px;
            border-radius: 4px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .btn-solid {
            background-color: var(--primary-color);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
        }

        /* Main Content */
        main {
            padding: 50px 5%;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-container {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--secondary-color);
        }

        .form-group.error input,
        .form-group.error select {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #008f45;
        }

        /* Footer */
        footer {
            background-color: var(--primary-color);
            color: #fff;
            padding: 40px 5%;
            text-align: center;
            margin-top: 50px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; color: inherit;"><h1>PNK Inmobiliaria</h1></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro-propietario.html">Registro Propietario</a></li>
                <li><a href="registro-gestor.html">Registro Gestor</a></li>
                <li><a href="mantenedor-propiedades.html">Propiedades</a></li>
                <li><a href="mantenedor-usuarios.html">Usuarios</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <a href="#" class="btn-outline">Iniciar Sesión</a>
            <a href="#" class="btn-solid">Registrarse</a>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2>Registro de Propietario</h2>
            <form action="#" method="post" aria-labelledby="form-title">
                <fieldset>
                    <legend id="form-title" style="display: none;">Formulario de Registro de Propietario</legend>

                    <div class="form-group">
                        <label for="rut">RUT</label>
                        <input type="text" id="rut" name="rut" required aria-label="Ingrese su RUT chileno" placeholder="Ej: 12.345.678-9">
                        <div class="error-message" id="rut-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required aria-label="Ingrese su nombre completo" placeholder="Ej: Juan Pérez González">
                        <div class="error-message" id="nombre-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="fecha-nacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required aria-label="Seleccione su fecha de nacimiento">
                        <div class="error-message" id="fecha-nacimiento-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required aria-label="Ingrese su dirección de correo electrónico" placeholder="ejemplo@correo.com">
                        <div class="error-message" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required aria-label="Cree una contraseña segura" placeholder="Mínimo 8 caracteres">
                        <div class="error-message" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="sexo">Sexo</label>
                        <select id="sexo" name="sexo" required aria-label="Seleccione su sexo">
                            <option value="">Seleccione...</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro</option>
                            <option value="prefiero-no-decir">Prefiero no decir</option>
                        </select>
                        <div class="error-message" id="sexo-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono Móvil</label>
                        <input type="tel" id="telefono" name="telefono" required aria-label="Ingrese su número de teléfono móvil" placeholder="Ej: +569 1234 5678">
                        <div class="error-message" id="telefono-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="numero-propiedad">N° de la propiedad según registro de Bienes Raíces</label>
                        <input type="text" id="numero-propiedad" name="numero-propiedad" required aria-label="Ingrese el número de registro de su propiedad" placeholder="Ej: 123456789">
                        <div class="error-message" id="numero-propiedad-error"></div>
                    </div>

                    <button type="submit" class="btn-submit" aria-label="Enviar formulario de registro">Registrar Propietario</button>
                </fieldset>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 PNK Inmobiliaria - La Serena, Región de Coquimbo</p>
        <p><a href="#">Términos y Condiciones</a> | <a href="#">Política de Privacidad</a></p>
    </footer>

    <script>
        // Función para validar RUT chileno
        function validarRUT(rut) {
            rut = rut.replace(/\./g, '').replace(/-/g, '');
            if (rut.length < 8 || rut.length > 9) return false;
            
            const cuerpo = rut.slice(0, -1);
            const dv = rut.slice(-1).toUpperCase();
            
            let suma = 0;
            let multiplicador = 2;
            
            for (let i = cuerpo.length - 1; i >= 0; i--) {
                suma += parseInt(cuerpo[i]) * multiplicador;
                multiplicador = multiplicador === 7 ? 2 : multiplicador + 1;
            }
            
            const resto = suma % 11;
            const dvCalculado = resto === 0 ? '0' : resto === 1 ? 'K' : (11 - resto).toString();
            
            return dv === dvCalculado;
        }

        // Función para mostrar/ocultar errores
        function mostrarError(campoId, mensaje) {
            const errorDiv = document.getElementById(campoId + '-error');
            const formGroup = errorDiv.parentElement;
            
            if (mensaje) {
                errorDiv.textContent = mensaje;
                formGroup.classList.add('error');
            } else {
                errorDiv.textContent = '';
                formGroup.classList.remove('error');
            }
        }

        // Validaciones en tiempo real
        document.getElementById('rut').addEventListener('blur', function() {
            const rut = this.value.trim();
            if (!rut) {
                mostrarError('rut', 'El RUT es obligatorio');
            } else if (!validarRUT(rut)) {
                mostrarError('rut', 'RUT inválido. Use formato 12.345.678-9');
            } else {
                mostrarError('rut', '');
            }
        });

        document.getElementById('nombre').addEventListener('blur', function() {
            const nombre = this.value.trim();
            if (!nombre) {
                mostrarError('nombre', 'El nombre completo es obligatorio');
            } else if (nombre.length < 3) {
                mostrarError('nombre', 'El nombre debe tener al menos 3 caracteres');
            } else if (!nombre.includes(' ')) {
                mostrarError('nombre', 'Ingrese nombre y apellido separados por espacio');
            } else {
                mostrarError('nombre', '');
            }
        });

        document.getElementById('fecha-nacimiento').addEventListener('blur', function() {
            const fecha = this.value;
            if (!fecha) {
                mostrarError('fecha-nacimiento', 'La fecha de nacimiento es obligatoria');
            } else {
                const fechaNac = new Date(fecha);
                const hoy = new Date();
                const edad = hoy.getFullYear() - fechaNac.getFullYear();
                if (edad < 18) {
                    mostrarError('fecha-nacimiento', 'Debe ser mayor de 18 años');
                } else if (edad > 120) {
                    mostrarError('fecha-nacimiento', 'Fecha de nacimiento inválida');
                } else {
                    mostrarError('fecha-nacimiento', '');
                }
            }
        });

        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                mostrarError('email', 'El correo electrónico es obligatorio');
            } else if (!emailRegex.test(email)) {
                mostrarError('email', 'Correo electrónico inválido');
            } else {
                mostrarError('email', '');
            }
        });

        document.getElementById('password').addEventListener('blur', function() {
            const password = this.value;
            if (!password) {
                mostrarError('password', 'La contraseña es obligatoria');
            } else if (password.length < 8) {
                mostrarError('password', 'La contraseña debe tener al menos 8 caracteres');
            } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                mostrarError('password', 'Debe contener mayúsculas, minúsculas y números');
            } else {
                mostrarError('password', '');
            }
        });

        document.getElementById('sexo').addEventListener('blur', function() {
            const sexo = this.value;
            if (!sexo) {
                mostrarError('sexo', 'Seleccione su sexo');
            } else {
                mostrarError('sexo', '');
            }
        });

        document.getElementById('telefono').addEventListener('blur', function() {
            const telefono = this.value.trim();
            const telefonoRegex = /^(\+569|569|09)[0-9]{8}$/;
            if (!telefono) {
                mostrarError('telefono', 'El teléfono es obligatorio');
            } else if (!telefonoRegex.test(telefono.replace(/\s/g, ''))) {
                mostrarError('telefono', 'Formato inválido. Use +569 12345678');
            } else {
                mostrarError('telefono', '');
            }
        });

        document.getElementById('numero-propiedad').addEventListener('blur', function() {
            const numero = this.value.trim();
            if (!numero) {
                mostrarError('numero-propiedad', 'El número de propiedad es obligatorio');
            } else if (!/^\d{9}$/.test(numero)) {
                mostrarError('numero-propiedad', 'Debe ser un número de 9 dígitos');
            } else {
                mostrarError('numero-propiedad', '');
            }
        });

        // Validación al enviar formulario
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Validar todos los campos antes de enviar
            const campos = ['rut', 'nombre', 'fecha-nacimiento', 'email', 'password', 'sexo', 'telefono', 'numero-propiedad'];
            let formularioValido = true;
            
            campos.forEach(campo => {
                const elemento = document.getElementById(campo);
                elemento.dispatchEvent(new Event('blur'));
                if (document.getElementById(campo + '-error').textContent) {
                    formularioValido = false;
                }
            });
            
            if (!formularioValido) {
                alert('Por favor, corrija los errores en el formulario antes de enviar.');
                return;
            }
            
            const nombreCompleto = document.getElementById('nombre').value.trim();
            const rut = document.getElementById('rut').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const sexo = document.getElementById('sexo').value;
            const telefono = document.getElementById('telefono').value.trim();
            const numeroPropiedad = document.getElementById('numero-propiedad').value.trim();
            const fechaNacimiento = document.getElementById('fecha-nacimiento').value;
            
            const usuariosGuardados = JSON.parse(localStorage.getItem('usuariosRegistrados')) || [];
            const rutExiste = usuariosGuardados.some(u => u.rut.toLowerCase() === rut.toLowerCase());
            const emailExiste = usuariosGuardados.some(u => u.email.toLowerCase() === email.toLowerCase());
            
            if (rutExiste || emailExiste) {
                if (rutExiste) mostrarError('rut', 'El RUT ya está registrado');
                if (emailExiste) mostrarError('email', 'Este correo ya está registrado');
                alert('El usuario ya existe. Inicia sesión o usa otros datos.');
                return;
            }
            
            // Guardar datos del usuario en localStorage como parte de un arreglo
            const usuario = {
                nombre: nombreCompleto,
                rut: rut,
                email: email,
                password: password,
                sexo: sexo,
                telefono: telefono,
                numeroPropiedad: numeroPropiedad,
                fechaNacimiento: fechaNacimiento,
                tipo: 'propietario',
                status: 'pendiente'
            };
            
            usuariosGuardados.push(usuario);
            localStorage.setItem('usuariosRegistrados', JSON.stringify(usuariosGuardados));
            
            // Mostrar mensaje de éxito y redirigir
            alert('Registro exitoso. Tu cuenta está pendiente de activación por el administrador. Te notificaremos cuando esté activa.');
            window.location.href = 'login.html';
        });
    </script>

</body>
</html>
